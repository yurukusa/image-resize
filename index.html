<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}

.drop-zone{border:2px dashed #333;border-radius:12px;padding:48px;text-align:center;cursor:pointer;margin-bottom:20px;transition:border-color 0.2s}
.drop-zone:hover,.drop-zone.drag{border-color:#3b82f6}
.drop-zone .icon{font-size:2rem;margin-bottom:8px}
.drop-zone .text{color:#555;font-size:0.88rem}
.drop-zone input{display:none}

.editor{display:none;margin-bottom:20px}
.preview-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.preview-pane{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:12px;text-align:center}
.preview-pane h3{font-size:0.72rem;color:#555;margin-bottom:8px}
.preview-pane img{max-width:100%;max-height:250px;border-radius:6px}
.preview-pane .dims{font-size:0.72rem;color:#888;margin-top:6px;font-family:'Fira Code',monospace}

.controls{background:#161616;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:16px}
.ctrl-row{display:flex;gap:12px;align-items:end;margin-bottom:12px;flex-wrap:wrap}
.ctrl-item{display:flex;flex-direction:column;gap:4px}
.ctrl-item label{font-size:0.72rem;color:#555}
.ctrl-item input,.ctrl-item select{padding:8px 12px;border-radius:6px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-family:'Fira Code',monospace;font-size:0.88rem;outline:none}
.ctrl-item input:focus{border-color:#3b82f6}
.ctrl-item input[type=number]{width:100px}
.lock-btn{padding:8px 12px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;cursor:pointer;font-size:0.82rem;margin-bottom:0;align-self:end}
.lock-btn.active{border-color:#3b82f6;color:#4da6ff}

.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.preset-btn{padding:4px 10px;border-radius:6px;border:1px solid #222;background:#0d0d0d;color:#555;font-size:0.72rem;cursor:pointer}
.preset-btn:hover{border-color:#3b82f6;color:#888}

.quality-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.quality-row label{font-size:0.72rem;color:#555;min-width:60px}
.quality-row input[type=range]{flex:1;accent-color:#3b82f6}
.quality-row .val{font-size:0.72rem;color:#4da6ff;font-family:'Fira Code',monospace;min-width:30px}

.btn-row{display:flex;gap:8px}
.btn{padding:8px 20px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.82rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#ccc}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}

.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{background:#161616;border:1px solid #222;border-radius:8px;padding:8px 14px;text-align:center}
.stat .num{font-family:'Fira Code',monospace;font-size:1rem;color:#4da6ff}
.stat .lbl{font-size:0.68rem;color:#555;margin-top:2px}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){.preview-row{grid-template-columns:1fr}}

<body>
<div class="container">
<h1>Image Resize</h1>
<p class="subtitle">Resize images in your browser. No upload, no server. Privacy first.</p>

<div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
  <div class="icon">📷</div>
  <div class="text">Drop an image here or click to browse</div>
  <input type="file" id="fileInput" accept="image/*" onchange="loadFile(event)">
</div>

<div class="editor" id="editor">
  <div class="preview-row">
    <div class="preview-pane"><h3>Original</h3><img id="origImg"><div class="dims" id="origDims"></div></div>
    <div class="preview-pane"><h3>Resized</h3><canvas id="canvas" style="max-width:100%;max-height:250px;border-radius:6px"></canvas><div class="dims" id="newDims"></div></div>
  </div>

  <div class="controls">
    <div class="presets">
      <button class="preset-btn" onclick="setSize(1920,1080)">1920×1080</button>
      <button class="preset-btn" onclick="setSize(1280,720)">1280×720</button>
      <button class="preset-btn" onclick="setSize(800,600)">800×600</button>
      <button class="preset-btn" onclick="setSize(512,512)">512×512</button>
      <button class="preset-btn" onclick="setSize(256,256)">256×256</button>
      <button class="preset-btn" onclick="setSize(128,128)">128×128</button>
      <button class="preset-btn" onclick="setSize(64,64)">64×64</button>
      <button class="preset-btn" onclick="setPercent(50)">50%</button>
      <button class="preset-btn" onclick="setPercent(25)">25%</button>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-item"><label>Width</label><input type="number" id="newW" min="1" max="8000" oninput="onWidth()"></div>
      <button class="lock-btn active" id="lockBtn" onclick="toggleLock()">🔗</button>
      <div class="ctrl-item"><label>Height</label><input type="number" id="newH" min="1" max="8000" oninput="onHeight()"></div>
      <div class="ctrl-item"><label>Format</label><select id="format" onchange="resize()"><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WebP</option></select></div>
    </div>
    <div class="quality-row" id="qualityRow" style="display:none">
      <label>Quality</label>
      <input type="range" id="quality" min="10" max="100" value="85" oninput="resize()">
      <span class="val" id="qualityVal">85%</span>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="download()">Download</button>
      <button class="btn" onclick="reset()">New Image</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>
</div>
</div>

<footer>
  <a href="https://github.com/yurukusa/image-resize">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
let origW=0,origH=0,locked=true,img=new Image();

const dropZone=document.getElementById('dropZone');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag');if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0])});

document.getElementById('format').addEventListener('change',()=>{
  const fmt=document.getElementById('format').value;
  document.getElementById('qualityRow').style.display=fmt==='png'?'none':'flex';
  resize();
});

function loadFile(e){if(e.target.files[0])processFile(e.target.files[0])}

function processFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    img.onload=()=>{
      origW=img.naturalWidth;origH=img.naturalHeight;
      document.getElementById('origImg').src=img.src;
      document.getElementById('origDims').textContent=`${origW} × ${origH}`;
      document.getElementById('newW').value=origW;
      document.getElementById('newH').value=origH;
      document.getElementById('dropZone').style.display='none';
      document.getElementById('editor').style.display='block';
      resize();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function toggleLock(){
  locked=!locked;
  const btn=document.getElementById('lockBtn');
  btn.classList.toggle('active',locked);
  btn.textContent=locked?'🔗':'🔓';
}

function onWidth(){
  const w=+document.getElementById('newW').value;
  if(locked&&origW){document.getElementById('newH').value=Math.round(w*origH/origW)}
  resize();
}
function onHeight(){
  const h=+document.getElementById('newH').value;
  if(locked&&origH){document.getElementById('newW').value=Math.round(h*origW/origH)}
  resize();
}

function setSize(w,h){
  if(locked){
    const ratio=origW/origH;
    if(w/h>ratio){w=Math.round(h*ratio)}else{h=Math.round(w/ratio)}
  }
  document.getElementById('newW').value=w;
  document.getElementById('newH').value=h;
  resize();
}
function setPercent(p){
  document.getElementById('newW').value=Math.round(origW*p/100);
  document.getElementById('newH').value=Math.round(origH*p/100);
  resize();
}

function resize(){
  const w=+document.getElementById('newW').value||1;
  const h=+document.getElementById('newH').value||1;
  const canvas=document.getElementById('canvas');
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.drawImage(img,0,0,w,h);

  document.getElementById('newDims').textContent=`${w} × ${h}`;
  document.getElementById('qualityVal').textContent=document.getElementById('quality').value+'%';

  // Stats
  const fmt=document.getElementById('format').value;
  const q=fmt==='png'?undefined:(+document.getElementById('quality').value/100);
  const dataUrl=canvas.toDataURL('image/'+fmt,q);
  const newSize=Math.round((dataUrl.length-dataUrl.indexOf(',')-1)*3/4);
  const origSize=Math.round((img.src.length-img.src.indexOf(',')-1)*3/4);
  const reduction=origSize>0?Math.round((1-newSize/origSize)*100):0;

  document.getElementById('stats').innerHTML=[
    {num:`${w}×${h}`,lbl:'New Size'},
    {num:formatBytes(newSize),lbl:'File Size'},
    {num:(reduction>=0?'':'')+reduction+'%',lbl:'Size Change'},
    {num:fmt.toUpperCase(),lbl:'Format'},
  ].map(s=>`<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');
}

function download(){
  const w=+document.getElementById('newW').value;
  const h=+document.getElementById('newH').value;
  const fmt=document.getElementById('format').value;
  const q=fmt==='png'?undefined:(+document.getElementById('quality').value/100);
  const canvas=document.getElementById('canvas');
  const link=document.createElement('a');
  link.download=`resized_${w}x${h}.${fmt}`;
  link.href=canvas.toDataURL('image/'+fmt,q);
  link.click();
}

function reset(){
  document.getElementById('dropZone').style.display='block';
  document.getElementById('editor').style.display='none';
  document.getElementById('fileInput').value='';
}

function formatBytes(b){
  if(b<1024)return b+' B';
  if(b<1048576)return(b/1024).toFixed(1)+' KB';
  return(b/1048576).toFixed(1)+' MB';
}
</script>
